<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catppuccin Explorer</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,400;0,500;1,400&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #1e1e2e;
  --fg: #cdd6f4;
  --sub: #a6adc8;
  --muted: #6c7086;
  --s0: #313244;
  --s1: #45475a;
  --accent: #cba6f7;
  --grid-line: rgba(245,224,220,.06);
  --ease: cubic-bezier(.4, 0, .2, 1);
  --ease-out: cubic-bezier(0, 0, .2, 1);
}

body {
  background: var(--bg);
  color: var(--fg);
  font-family: 'DM Mono', monospace;
  min-height: 100vh;
  transition: background .5s var(--ease), color .5s var(--ease);
}

body::before {
  content: '';
  position: fixed; inset: 0;
  background-image:
    linear-gradient(var(--grid-line) 1px, transparent 1px),
    linear-gradient(90deg, var(--grid-line) 1px, transparent 1px),
    linear-gradient(rgba(255,255,255,.012) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,.012) 1px, transparent 1px);
  background-size: 48px 48px, 48px 48px, 8px 8px, 8px 8px;
  pointer-events: none;
  z-index: 0;
}

/* ── Layout ── */
.app { display: flex; min-height: 100vh; }

/* ── Sidebar ── */
.sidebar {
  width: 200px;
  flex-shrink: 0;
  position: sticky;
  top: 0;
  height: 100vh;
  overflow-y: auto;
  background: rgba(0,0,0,.2);
  border-right: 1px solid rgba(255,255,255,.05);
  padding: 28px 12px;
  z-index: 10;
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.sidebar-logo {
  padding: 4px 8px 24px;
  margin-bottom: 8px;
  border-bottom: 1px solid rgba(255,255,255,.05);
}
.sidebar-logo .logo-title {
  font-family: 'Syne', sans-serif;
  font-size: 15px;
  font-weight: 800;
  color: var(--fg);
  line-height: 1.1;
}
.sidebar-logo .logo-sub {
  font-size: 9px;
  letter-spacing: .18em;
  text-transform: uppercase;
  color: var(--muted);
  margin-top: 4px;
}

.sidebar-group-label {
  font-size: 9px;
  letter-spacing: .2em;
  text-transform: uppercase;
  color: var(--muted);
  padding: 16px 8px 6px;
}

.sidebar-btn {
  display: flex;
  align-items: center;
  gap: 9px;
  padding: 8px 10px;
  cursor: pointer;
  font-family: 'DM Mono', monospace;
  font-size: 12px;
  color: var(--sub);
  background: none;
  border: none;
  width: 100%;
  text-align: left;
  border-radius: 8px;
  transition: color .25s var(--ease), background .25s var(--ease);
  position: relative;
}

}
.sidebar-btn.active {
  color: var(--fg);
  background: rgba(255,255,255,.08);
}
.sidebar-btn.active .sidebar-dot {
  box-shadow: 0 0 0 3px rgba(255,255,255,.12);
}
.sidebar-dot {
  width: 9px; height: 9px;
  border-radius: 50%;
  flex-shrink: 0;
  transition: box-shadow .3s var(--ease);
}
.flavor-tag {
  margin-left: auto;
  font-size: 8px;
  letter-spacing: .08em;
  text-transform: uppercase;
  padding: 2px 6px;
  border-radius: 20px;
  background: rgba(255,255,255,.06);
  color: var(--muted);
}

/* ── Main ── */
.main {
  flex: 1;
  padding: 56px 52px 120px;
  position: relative;
  z-index: 1;
  min-width: 0;
  max-width: 960px;
}

/* ── Palette header ── */
.palette-header {
  margin-bottom: 64px;
}
.palette-eyebrow {
  font-size: 9px;
  letter-spacing: .22em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 10px;
  opacity: .8;
}
.palette-title {
  font-family: 'Syne', sans-serif;
  font-size: clamp(32px, 4vw, 48px);
  font-weight: 800;
  line-height: 1.0;
  color: var(--fg);
}
.palette-meta {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-top: 14px;
  flex-wrap: wrap;
}
.palette-desc {
  font-size: 11px;
  color: var(--sub);
  line-height: 1.8;
  flex: 1;
  min-width: 200px;
}
.palette-badge {
  font-size: 9px;
  letter-spacing: .14em;
  text-transform: uppercase;
  padding: 5px 14px;
  border-radius: 20px;
  border: 1px solid rgba(255,255,255,.1);
  color: var(--sub);
  white-space: nowrap;
  flex-shrink: 0;
}

/* ── Section block ── */
.section {
  margin-bottom: 72px;
  background: rgba(0,0,0,.28);
  backdrop-filter: blur(28px) saturate(1.4);
  -webkit-backdrop-filter: blur(28px) saturate(1.4);
  border: 1px solid rgba(255,255,255,.09);
  box-shadow: 0 8px 40px rgba(0,0,0,.3), inset 0 1px 0 rgba(255,255,255,.07);
  border-radius: 18px;
  padding: 28px 28px 24px;
}

.section-header {
  display: flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 24px;
}
.section-icon {
  width: 28px; height: 28px;
  border-radius: 8px;
  background: rgba(255,255,255,.06);
  display: flex; align-items: center; justify-content: center;
  font-size: 13px;
  flex-shrink: 0;
}
.section-title {
  font-family: 'Syne', sans-serif;
  font-size: 13px;
  font-weight: 700;
  letter-spacing: .06em;
  color: var(--fg);
}
.section-line { flex: 1; height: 1px; background: rgba(255,255,255,.06); }
.section-count {
  font-size: 10px;
  color: var(--muted);
  background: rgba(255,255,255,.05);
  padding: 3px 9px;
  border-radius: 20px;
}

/* ── Card swatches ── */
.swatches {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
}

.swatch {
  width: 110px;
  flex-shrink: 0;
  border-radius: 12px;
  cursor: pointer;
  border: 1px solid rgba(255,255,255,.12);
  background: rgba(0,0,0,.35);
  backdrop-filter: blur(20px) saturate(1.3);
  -webkit-backdrop-filter: blur(20px) saturate(1.3);
  box-shadow: 0 4px 16px rgba(0,0,0,.25), inset 0 1px 0 rgba(255,255,255,.08);
  transition: transform .2s var(--ease), box-shadow .2s var(--ease);
  position: relative;
  clip-path: inset(0 round 12px);
}
.swatch:active {
  transform: scale(.96);
  transition-duration: .1s;
}

.swatch-color {
  height: 80px;
  width: 100%;
  position: relative;
}

.swatch-check {
  position: absolute;
  inset: 0;
  display: flex; align-items: center; justify-content: center;
  background: rgba(0,0,0,.3);
  font-size: 18px;
  opacity: 0;
  transition: opacity .25s var(--ease);
}
.swatch.copied .swatch-check { opacity: 1; }

.swatch-info {
  padding: 9px 10px 10px;
  background: rgba(0,0,0,.18);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
}
.swatch-name {
  font-size: 11px;
  font-weight: 500;
  color: var(--fg);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.swatch-hex {
  font-size: 9px;
  color: var(--sub);
  margin-top: 1px;
  font-style: italic;
}
.swatch-use {
  font-size: 9px;
  color: var(--muted);
  margin-top: 5px;
  line-height: 1.5;
}

/* ── Mini UI preview ── */
.preview-wrap {
  margin-top: 24px;
  padding-top: 20px;
  border-top: 1px solid rgba(255,255,255,.05);
}
.preview-label {
  font-size: 9px;
  letter-spacing: .18em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.preview-label::after {
  content: '';
  flex: 1;
  height: 1px;
  background: rgba(255,255,255,.04);
}

/* ── Toast ── */
#toast {
  position: fixed;
  bottom: 28px; left: 50%;
  transform: translateX(-50%) translateY(8px);
  background: var(--s0);
  border: 1px solid rgba(255,255,255,.1);
  color: var(--fg);
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  padding: 8px 16px 8px 12px;
  border-radius: 999px;
  opacity: 0;
  pointer-events: none;
  transition: opacity .3s var(--ease), transform .3s var(--ease);
  z-index: 999;
  display: flex; align-items: center; gap: 9px;
  white-space: nowrap;
  box-shadow: 0 8px 32px rgba(0,0,0,.4);
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
#toast-dot {
  width: 14px; height: 14px;
  border-radius: 50%;
  flex-shrink: 0;
  transition: background .2s var(--ease);
}

/* ── Fade in animation for sections ── */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}
.section {
  animation: fadeUp .45s var(--ease-out) both;
}
.section:nth-child(1) { animation-delay: .05s; }
.section:nth-child(2) { animation-delay: .10s; }
.section:nth-child(3) { animation-delay: .15s; }
.section:nth-child(4) { animation-delay: .20s; }
.section:nth-child(5) { animation-delay: .25s; }

/* scrollbar */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--s1); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: var(--s0); }
</style>
</head>

function getMiniUI(flavor, sectionTitle) {
  const p = PALETTES[flavor];

  if (sectionTitle === 'Backgrounds') {
    const c = p.sections[0].colors;
    return `
      <div style="background:${c[1]?.hex || p.s0};border-radius:10px;padding:16px;font-family:'DM Mono',monospace;font-size:11px;display:flex;gap:10px">
        <div style="width:130px;background:${c[2]?.hex || p.bg};border-radius:7px;padding:12px;flex-shrink:0">
          <div style="font-size:9px;color:${p.muted};letter-spacing:.12em;text-transform:uppercase;margin-bottom:10px">nav</div>
          ${['Dashboard','Projects','Settings','Profile'].map((t,i) => `<div style="padding:6px 8px;border-radius:5px;background:${i===0?p.accent+'22':'transparent'};color:${i===0?p.accent:p.sub};margin-bottom:3px;cursor:pointer">${t}</div>`).join('')}
        </div>
        <div style="flex:1;display:flex;flex-direction:column;gap:8px">
          <div style="background:${c[0]?.hex || p.bg};border-radius:7px;padding:12px;color:${p.fg};font-size:12px;font-weight:500">Main content area</div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
            <div style="background:${p.s0};border-radius:7px;padding:10px;color:${p.sub};font-size:10px">Card A</div>
            <div style="background:${p.s0};border-radius:7px;padding:10px;color:${p.sub};font-size:10px">Card B</div>
          </div>
        </div>
      </div>`;
  }

  if (sectionTitle === 'Surfaces' || sectionTitle === 'Polar Night' || sectionTitle === 'Backgrounds' || sectionTitle === 'Muted / Subtle') {
    return `
      <div style="background:${p.bg};border-radius:10px;padding:16px;font-family:'DM Mono',monospace;font-size:11px">
        <div style="display:flex;gap:8px;margin-bottom:10px">
          <div style="flex:1;background:${p.s0};border-radius:7px;padding:10px">
            <div style="color:${p.muted};font-size:9px;margin-bottom:4px">REQUESTS</div>
            <div style="color:${p.fg};font-size:18px;font-family:'Syne',sans-serif;font-weight:700">2,847</div>
          </div>
          <div style="flex:1;background:${p.s0};border-radius:7px;padding:10px">
            <div style="color:${p.muted};font-size:9px;margin-bottom:4px">ERRORS</div>
            <div style="color:${p.fg};font-size:18px;font-family:'Syne',sans-serif;font-weight:700">12</div>
          </div>
          <div style="flex:1;background:${p.s0};border-radius:7px;padding:10px">
            <div style="color:${p.muted};font-size:9px;margin-bottom:4px">UPTIME</div>
            <div style="color:${p.fg};font-size:18px;font-family:'Syne',sans-serif;font-weight:700">99.9%</div>
          </div>
        </div>
        <div style="background:${p.s0};border-radius:7px;padding:12px">
          <div style="display:flex;justify-content:space-between;margin-bottom:8px">
            <span style="color:${p.fg}">Recent activity</span>
            <span style="color:${p.muted};font-size:10px">today</span>
          </div>
          ${['Build passed','PR merged','Deploy ok'].map(t=>`<div style="display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid ${p.s1}22"><div style="width:6px;height:6px;border-radius:50%;background:${p.accent}"></div><span style="color:${p.sub};font-size:10px">${t}</span></div>`).join('')}
        </div>
      </div>`;
  }

  if (sectionTitle === 'Text' || sectionTitle === 'Foregrounds' || sectionTitle === 'Snow Storm') {
    return `
      <div style="background:${p.bg};border-radius:10px;padding:20px;font-family:'DM Mono',monospace">
        <div style="font-family:'Syne',sans-serif;font-size:16px;font-weight:700;color:${p.fg};margin-bottom:4px">Typography scale</div>
        <div style="font-size:13px;color:${p.sub};margin-bottom:3px">Secondary — subtext level one</div>
        <div style="font-size:12px;color:${p.muted};margin-bottom:8px">Muted — placeholder and label text</div>
        <div style="background:${p.s0};border-radius:7px;padding:10px">
          <span style="color:${p.fg}">const </span><span style="color:${p.accent}">greet</span><span style="color:${p.sub}"> = </span><span style="color:${p.fg}">(name) </span><span style="color:${p.sub}">=&gt; </span><span style="color:${p.fg}">&#96;Hello, </span><span style="color:${p.accent}">\${name}</span><span style="color:${p.fg}">&#96;</span>
        </div>
      </div>`;
  }

  // Accents / Aurora / etc — show a component UI
  const accentColors = p.sections[p.sections.length - 1].colors;
  const green = accentColors.find(c => c.name.includes('green'))?.hex || p.accent;
  const red   = accentColors.find(c => c.name.includes('red'))?.hex   || '#f38ba8';
  const yellow= accentColors.find(c => c.name.includes('yellow') || c.name.includes('gold'))?.hex || '#f9e2af';
  const blue  = accentColors.find(c => c.name === 'blue' || c.name === 'foam' || c.name === 'nord8' || c.name === 'blue_bright')?.hex || p.accent;

  return `
    <div style="background:${p.bg};border-radius:10px;padding:16px;font-family:'DM Mono',monospace;font-size:11px">
      <div style="display:flex;gap:8px;margin-bottom:10px">
        <div style="flex:1;background:${p.s0};border-radius:7px;padding:10px;border-left:3px solid ${green}">
          <div style="color:${green};font-size:9px;letter-spacing:.1em;text-transform:uppercase;margin-bottom:2px">success</div>
          <div style="color:${p.fg}">Deploy complete</div>
        </div>
        <div style="flex:1;background:${p.s0};border-radius:7px;padding:10px;border-left:3px solid ${red}">
          <div style="color:${red};font-size:9px;letter-spacing:.1em;text-transform:uppercase;margin-bottom:2px">error</div>
          <div style="color:${p.fg}">Build failed</div>
        </div>
      </div>
      <div style="display:flex;gap:8px;margin-bottom:10px">
        <div style="flex:1;background:${p.s0};border-radius:7px;padding:10px;border-left:3px solid ${yellow}">
          <div style="color:${yellow};font-size:9px;letter-spacing:.1em;text-transform:uppercase;margin-bottom:2px">warning</div>
          <div style="color:${p.fg}">High memory usage</div>
        </div>
        <div style="flex:1;background:${p.s0};border-radius:7px;padding:10px;border-left:3px solid ${blue}">
          <div style="color:${blue};font-size:9px;letter-spacing:.1em;text-transform:uppercase;margin-bottom:2px">info</div>
          <div style="color:${p.fg}">Update available</div>
        </div>
      </div>
      <div style="display:flex;gap:6px">
        <button style="flex:1;padding:8px;border-radius:6px;background:${p.accent};border:none;color:${p.isLight ? '#fff' : p.bg};font-family:'DM Mono',monospace;font-size:11px;cursor:pointer">Primary</button>
        <button style="flex:1;padding:8px;border-radius:6px;background:transparent;border:1px solid ${p.s1};color:${p.sub};font-family:'DM Mono',monospace;font-size:11px;cursor:pointer">Secondary</button>
        <button style="flex:1;padding:8px;border-radius:6px;background:${red}22;border:1px solid ${red}44;color:${red};font-family:'DM Mono',monospace;font-size:11px;cursor:pointer">Danger</button>
      </div>
    </div>`;
}

function renderPalette(flavorKey) {
  const p = PALETTES[flavorKey];
  const main = document.getElementById('main');

  // Update CSS vars
  document.documentElement.style.setProperty('--bg', p.bg);
  document.documentElement.style.setProperty('--fg', p.fg);
  document.documentElement.style.setProperty('--sub', p.sub);
  document.documentElement.style.setProperty('--muted', p.muted);
  document.documentElement.style.setProperty('--s0', p.s0);
  document.documentElement.style.setProperty('--s1', p.s1);
  document.documentElement.style.setProperty('--accent', p.accent);
  document.documentElement.style.setProperty('--grid-line', p.gridLine);

  let html = `
    <div class="palette-header">
      <div class="palette-eyebrow">${p.tag}</div>
      <div class="palette-title">${p.name}</div>
      <div class="palette-meta">
        <div class="palette-desc">${p.desc}</div>
        <div class="palette-badge">${p.sections.reduce((a,s)=>a+s.colors.length,0)} colores</div>
      </div>
    </div>`;

  const icons = ['○','□','Tt','◈'];
  p.sections.forEach((sec, si) => {
    html += `
      <div class="section">
        <div class="section-header">
          <div class="section-icon">${icons[si] || '·'}</div>
          <div class="section-title">${sec.title}</div>
          <div class="section-line"></div>
          <div class="section-count">${sec.colors.length}</div>
        </div>
        <div class="swatches">`;

    sec.colors.forEach(c => {
      html += `
          <div class="swatch" onclick="copyColor('${c.hex}', '${c.name}', this)">
            <div class="swatch-color" style="background:${c.hex}">
              <div class="swatch-check">✓</div>
            </div>
            <div class="swatch-info">
              <div class="swatch-name">${c.name}</div>
              <div class="swatch-hex">${c.hex}</div>
              <div class="swatch-use">${c.use}</div>
            </div>
          </div>`;
    });

    html += `</div>
        <div class="preview-wrap">
          <div class="preview-label">vista previa</div>
          ${getMiniUI(flavorKey, sec.title)}
        </div>
      </div>`;
  });

  html += `
    <div class="section" style="margin-bottom:0">
      <div class="section-header">
        <div class="section-icon">Aa</div>
        <div class="section-title">Fuentes utilizadas</div>
        <div class="section-line"></div>
      </div>
      <div style="display:flex;flex-wrap:wrap;gap:12px">
        <div class="swatch" style="width:auto;flex:1;min-width:180px;clip-path:none;border-radius:12px" onclick="copyColor('Syne','Syne',this)">
          <div class="swatch-color" style="background:rgba(255,255,255,.04);display:flex;align-items:center;justify-content:center;height:72px">
            <span style="font-family:'Syne',sans-serif;font-size:28px;font-weight:800;color:var(--fg)">Syne</span>
          </div>
          <div class="swatch-info">
            <div class="swatch-name">Syne</div>
            <div class="swatch-hex">google fonts</div>
            <div class="swatch-use">Títulos · headings · display · peso 700–800</div>
          </div>
        </div>
        <div class="swatch" style="width:auto;flex:1;min-width:180px;clip-path:none;border-radius:12px" onclick="copyColor('DM Mono','DM Mono',this)">
          <div class="swatch-color" style="background:rgba(255,255,255,.04);display:flex;align-items:center;justify-content:center;height:72px">
            <span style="font-family:'DM Mono',monospace;font-size:20px;font-weight:400;color:var(--fg)">DM Mono</span>
          </div>
          <div class="swatch-info">
            <div class="swatch-name">DM Mono</div>
            <div class="swatch-hex">google fonts</div>
            <div class="swatch-use">Cuerpo · etiquetas · código · valores hex · peso 400–500</div>
          </div>
        </div>
      </div>
    </div>`;

  main.innerHTML = html;
}

// ─────────────────────────────────────────────
// INTERACTIONS
// ─────────────────────────────────────────────
let toastTimer;

function copyColor(hex, name, el) {
  navigator.clipboard.writeText(hex).then(() => {
    document.querySelectorAll('.swatch.copied').forEach(s => s.classList.remove('copied'));
    el.classList.add('copied');
    document.getElementById('toast-dot').style.background = hex;
    document.getElementById('toast-text').textContent = `${name}  ${hex}`;
    document.getElementById('toast').classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => {
      document.getElementById('toast').classList.remove('show');
      el.classList.remove('copied');
    }, 1600);
  });
}

function setFlavor(key) {
  document.querySelectorAll('.sidebar-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('btn-' + key).classList.add('active');
  renderPalette(key);
}

// init
setFlavor('mocha');
</script>
</body>
